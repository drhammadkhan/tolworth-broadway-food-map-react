name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # `npm install` (not `npm ci`): Vite 8's rolldown pulls platform-specific
      # native binaries whose nested deps aren't all in a macOS-generated lock,
      # so strict `npm ci` fails on the linux runner. install resolves correctly.
      - run: npm install --no-audit --no-fund
        working-directory: app
      - run: npm run build
        working-directory: app
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
